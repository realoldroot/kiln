# Privacy-hardened config: no access logs (chat traffic never touches disk),
# no request/response spooling to temp files, tracking cookies stripped from
# the Ollama relay. Designed to run in a read-only container as non-root
# (nginx-unprivileged: pid + temp paths live under /tmp, which is a tmpfs).

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    # Nothing about who chatted when is worth keeping. Errors still go to stderr.
    access_log off;

    # This container listens on 8080, but it is almost always published on a
    # different host port or behind a reverse proxy (usually 443). Redirects
    # must therefore be relative — otherwise nginx would write its internal
    # port and http:// scheme into Location headers and send browsers to
    # http://your-domain:8080/…, which doesn't exist from the outside.
    absolute_redirect off;
    port_in_redirect off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Requests to the bare relay path (curl during debugging, health checks)
    # get a relative redirect instead of nginx's implicit absolute one.
    location = /api/ollama {
        return 308 /api/ollama/;
    }

    # Same-origin relay for Ollama cloud — ollama.com sends no CORS headers,
    # so the browser can't call it directly. The app defaults to /api/ollama.
    location /api/ollama/ {
        # Docker's embedded DNS first (respects the host's DNS setup on any
        # compose/user-defined network); public resolvers as a fallback for
        # `docker run` on the default bridge, where 127.0.0.11 isn't running.
        resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        resolver_timeout 5s;
        set $ollama_upstream https://ollama.com;
        rewrite ^/api/ollama/(.*)$ /$1 break;
        proxy_pass $ollama_upstream;
        proxy_set_header Host ollama.com;
        proxy_ssl_server_name on;
        proxy_ssl_name ollama.com;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # privacy: relay only — never write bodies to disk, in either direction
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_cache off;

        # privacy: don't let the upstream set or read tracking cookies through us,
        # and don't leak the client's address upstream
        proxy_set_header Cookie "";
        proxy_hide_header Set-Cookie;
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Real-IP "";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 50m;
    }

    # Never cache the service worker or the app shell.
    # (`expires` rather than `add_header Cache-Control` so the security
    # headers above keep inheriting into these locations.)
    location = /sw.js {
        expires -1;
    }
    location = /index.html {
        expires -1;
    }
    location = /manifest.webmanifest {
        expires -1;
        types { } default_type application/manifest+json;
    }

    # Hashed assets are immutable
    location /assets/ {
        expires 1y;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

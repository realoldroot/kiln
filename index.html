<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Kiln</title>
    <meta name="description" content="A local-first AI chat app. Your keys, your chats, your device." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kiln" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#262624" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      // Apply theme before first paint to avoid flash
      try {
        var s = JSON.parse(localStorage.getItem("amber-settings") || "{}");
        var t = (s.state && s.state.theme) || "system";
        var dark = t === "dark" || (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
